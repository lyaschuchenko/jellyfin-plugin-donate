<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Donate</title>
</head>
<body>
    <div id="DonateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="DonateConfigForm">
                    <div class="inputContainer">
                        <label class="inputeLabel inputLabelUnfocused" for="DonateUrl">Donation Link (Buy Me a Coffee, Monobank, PayPal, etc.)</label>
                        <input id="DonateUrl" name="DonateUrl" type="text" is="emby-input" />
                        <div class="fieldDescription">Enter the full URL where users can support your server (e.g., https://send.monobank.ua/...).</div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var DonateConfig = {
                pluginUniqueId: 'b7162d9a-f7a9-453f-a621-40c628213b7c'
            };

            document.querySelector('#DonateConfigPage')
                .addEventListener('pageshow', function() {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(DonateConfig.pluginUniqueId).then(function (config) {
                        document.querySelector('#DonateUrl').value = config.DonateUrl || "";
                        Dashboard.hideLoadingMsg();
                    });
                });
                 
            document.querySelector('#DonateConfigForm')
                .addEventListener('submit', function(e) {
                e.preventDefault(); 
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(DonateConfig.pluginUniqueId).then(function (config) {
                    config.DonateUrl = document.querySelector('#DonateUrl').value;
                    ApiClient.updatePluginConfiguration(DonateConfig.pluginUniqueId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });
                return false;
            });
        </script>
    </div>
</body>
</html>
